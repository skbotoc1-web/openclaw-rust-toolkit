[activation]
min_input_chars = 8000
min_input_lines = 220
always_match = [
  "openclaw logs",
  "docker logs",
]
never_match = [
  "cat secrets",
  "private_key",
]
flag = "RUST_TOOLKIT_USED"

[condense]
head_lines = 40
tail_lines = 40
max_lines = 260
max_signal_lines = 120
dedupe = true
signal_regex = "(?i)error|warn|failed|exception|traceback|critical|denied|timeout|EACCES|ENOENT|unresolved"
